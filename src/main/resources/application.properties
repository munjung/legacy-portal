# DB 자동 선택: MariaDB 가 켜져 있으면 MariaDB, 없으면 H2 인메모리로 자동 폴백.
#  → 어느 DB 를 쓸지는 DataSourceConfig.java 가 시작 시 결정(여기서 datasource.url 고정 안 함).
#  → 프로파일/URL 입력 없이 그냥  .\mvnw.cmd spring-boot:run  하면 알아서 된다.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# (H2 로 폴백됐을 때만) 데이터 확인용 웹 콘솔 - DB 선택과는 무관, 단순 조회 도구
#   http://localhost:8080/h2-console   JDBC URL: jdbc:h2:mem:portal · 사용자: sa
spring.h2.console.enabled=true
server.port=8080
