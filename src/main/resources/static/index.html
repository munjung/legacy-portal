<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사내 업무 포털</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">

<!-- ===== 로그인 화면 ===== -->
<div id="loginView" class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-80">
    <h1 class="text-xl font-bold text-cyan-700 mb-1">사내 업무 포털</h1>
    <p class="text-sm text-slate-500 mb-6">결재 / 공지 / 일정 (Legacy)</p>
    <label class="block text-sm font-semibold mb-1">사용자 선택</label>
    <select id="loginUser" class="w-full border rounded-lg p-2 mb-4"></select>
    <button onclick="login()" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 rounded-lg">로그인</button>
    <p class="text-xs text-slate-400 mt-4">데모용 — 비밀번호 없이 사용자만 선택합니다.</p>
  </div>
</div>

<!-- ===== 앱 화면 ===== -->
<div id="appView" class="hidden">
  <!-- 상단바 -->
  <header class="bg-cyan-700 text-white px-6 py-3 flex items-center justify-between shadow">
    <div class="font-bold">사내 업무 포털</div>
    <div class="flex items-center gap-3 text-sm">
      <span id="who"></span>
      <button onclick="logout()" class="bg-cyan-800 hover:bg-cyan-900 px-3 py-1 rounded">로그아웃</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-6 grid md:grid-cols-2 gap-6">

    <!-- 새 기안 -->
    <section class="bg-white rounded-xl shadow p-5 md:col-span-2">
      <h2 class="font-bold text-cyan-700 mb-3">📝 새 결재 기안</h2>
      <div class="grid sm:grid-cols-2 gap-3">
        <label class="text-sm">제목
          <input id="title" value="노트북 구매" class="mt-1 w-full border rounded p-2"></label>
        <label class="text-sm">내용
          <input id="content" value="개발용 노트북" class="mt-1 w-full border rounded p-2"></label>
        <label class="text-sm">유형
          <select id="type" class="mt-1 w-full border rounded p-2">
            <option value="1">지출</option><option value="2">휴가</option><option value="3">구매</option><option value="4">기타</option></select></label>
        <label class="text-sm">우선순위
          <select id="priority" class="mt-1 w-full border rounded p-2">
            <option value="1">낮음</option><option value="2" selected>보통</option><option value="3">높음</option></select></label>
        <label class="text-sm">결재자
          <select id="approverId" class="mt-1 w-full border rounded p-2"></select></label>
        <label class="text-sm">금액(원)
          <input id="amount" type="number" value="1200000" class="mt-1 w-full border rounded p-2"></label>
      </div>
      <button onclick="createApproval()" class="mt-4 bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-5 py-2 rounded-lg">기안 생성</button>
    </section>

    <!-- 내 기안 -->
    <section class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-cyan-700">📤 내가 기안한 결재</h2>
        <button onclick="loadDrafts()" class="text-xs text-cyan-600 hover:underline">새로고침</button>
      </div>
      <div id="drafts" class="space-y-2 text-sm"></div>
    </section>

    <!-- 결재함 -->
    <section class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-cyan-700">📥 내 결재함(대기 + 처리 이력)</h2>
        <button onclick="loadInbox()" class="text-xs text-cyan-600 hover:underline">새로고침</button>
      </div>
      <div id="inbox" class="space-y-2 text-sm"></div>
    </section>
  </main>

  <p class="text-center text-xs text-slate-400 pb-6">DB 직접 보기: <a class="underline" href="/h2-console">/h2-console</a> (jdbc:h2:mem:portal, sa)</p>
</div>

<script>
const T={1:'지출',2:'휴가',3:'구매',4:'기타'}, P={1:'낮음',2:'보통',3:'높음'};
const S={0:['임시저장','bg-slate-200 text-slate-700'],1:['상신','bg-amber-200 text-amber-800'],
         2:['승인','bg-green-200 text-green-800'],3:['반려','bg-red-200 text-red-800'],9:['취소','bg-slate-300 text-slate-600']};
let users=[], me=null;
const $ = id => document.getElementById(id);
const won = n => Number(n).toLocaleString('ko-KR')+'원';
const api = (url,opt) => fetch(url,opt);

// ---- 로그인 ----
async function boot(){
  users = await (await api('/api/users')).json();
  $('loginUser').innerHTML = users.map(u=>`<option value="${u.id}">${u.name} (${roleName(u.role)})</option>`).join('');
  $('approverId').innerHTML = users.map(u=>`<option value="${u.id}" ${u.id===2?'selected':''}>${u.name} (${roleName(u.role)})</option>`).join('');
  const saved = localStorage.getItem('me');
  if(saved){ me = JSON.parse(saved); enterApp(); }
}
function roleName(r){ return r===3?'임원':r===2?'팀장':'사원'; }
function login(){
  const id = +$('loginUser').value;
  me = users.find(u=>u.id===id);
  localStorage.setItem('me', JSON.stringify(me));
  enterApp();
}
function logout(){ localStorage.removeItem('me'); location.reload(); }
function enterApp(){
  $('loginView').classList.add('hidden');
  $('appView').classList.remove('hidden');
  $('who').textContent = me.name+' · '+roleName(me.role);
  loadDrafts(); loadInbox();
}

// ---- 기안 생성 ----
async function createApproval(){
  const body={title:$('title').value,content:$('content').value,type:+$('type').value,priority:+$('priority').value,
              drafterId:me.id,approverId:+$('approverId').value,amount:+$('amount').value,urgent:false};
  const r=await api('/api/approvals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){ await loadDrafts(); alert('기안 생성 완료 (임시저장). "상신" 버튼을 눌러 올리세요.'); }
  else alert('생성 실패: '+r.status);
}

// ---- 처리 ----
async function act(id, action){
  const r=await api('/api/approvals/'+id+'/process',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:me.id,action,reason:'사유 입력'})});
  await loadDrafts(); await loadInbox();
}

// ---- 목록 ----
function badge(s){ const [t,c]=S[s]||[s,'bg-slate-200']; return `<span class="px-2 py-0.5 rounded text-xs font-bold ${c}">${t}</span>`; }
function card(a, buttons){
  return `<div class="border rounded-lg p-3 flex items-center justify-between">
    <div><div class="font-semibold">#${a.id} ${a.title} ${badge(a.status)}</div>
      <div class="text-xs text-slate-500">${T[a.type]||a.type} · 우선순위 ${P[a.priority]||a.priority} · ${won(a.amount)}</div></div>
    <div class="flex gap-1">${buttons}</div></div>`;
}
const btn=(label,color,onclick)=>`<button onclick="${onclick}" class="${color} text-white text-xs px-2.5 py-1 rounded">${label}</button>`;

async function loadDrafts(){
  const list = await (await api('/api/approvals/drafts/'+me.id)).json();
  $('drafts').innerHTML = list.length ? list.map(a=>{
    let b='';
    if(a.status===0){ b+=btn('상신','bg-cyan-600',`act(${a.id},1)`); b+=btn('취소','bg-slate-400',`act(${a.id},9)`); }
    else if(a.status===1){ b+=btn('취소','bg-slate-400',`act(${a.id},9)`); }
    return card(a,b);
  }).join('') : '<p class="text-slate-400 text-sm">기안한 결재가 없습니다. 위에서 새로 만들어 보세요.</p>';
}
async function loadInbox(){
  const list = await (await api('/api/approvals/inbox/'+me.id)).json();
  if(!list.length){ $('inbox').innerHTML='<p class="text-slate-400 text-sm">받은 결재가 없습니다.</p>'; return; }
  // 대기(상신=1)는 위에 + 버튼, 처리한 것(승인/반려/취소)은 아래에 이력으로
  const order = a => a.status===1 ? 0 : 1;
  $('inbox').innerHTML = list.sort((x,y)=>order(x)-order(y)).map(a=>{
    const b = (a.status===1) ? btn('승인','bg-green-600',`act(${a.id},2)`)+btn('반려','bg-red-500',`act(${a.id},3)`) : '';
    return card(a,b);
  }).join('');
}

boot();
</script>
</body>
</html>
